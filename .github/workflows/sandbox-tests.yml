name: Sandbox fixture tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12.11
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.4
      - name: Install sandbox dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            apparmor-profiles bubblewrap gcc libc6-dev util-linux
      - name: Install pinned root-owned Rust toolchain
        run: |
          rustup toolchain install 1.87.0 --profile minimal
          rust_sysroot="$(rustup run 1.87.0 rustc --print sysroot)"
          sudo install -d /usr/local/lib/rust-1.87.0
          sudo cp -a "${rust_sysroot}/." /usr/local/lib/rust-1.87.0/
          sudo chown -R root:root /usr/local/lib/rust-1.87.0
          sudo chmod -R go-w /usr/local/lib/rust-1.87.0
          sudo ln -sfn /usr/local/lib/rust-1.87.0/bin/cargo /usr/local/bin/cargo
          sudo ln -sfn /usr/local/lib/rust-1.87.0/bin/rustc /usr/local/bin/rustc
      - name: Install pinned root-owned Python runtime
        run: |
          sudo install -d /usr/local/lib/python-3.12.11
          sudo cp -a "${pythonLocation}/." /usr/local/lib/python-3.12.11/
          sudo chown -R root:root /usr/local/lib/python-3.12.11
          sudo chmod -R go-w /usr/local/lib/python-3.12.11
          sudo ln -sfn \
            /usr/local/lib/python-3.12.11/bin/python3 \
            /usr/local/bin/python3
      - name: Install pinned root-owned Go toolchain
        run: |
          go_root="$(go env GOROOT)"
          sudo install -d /usr/local/lib/go-1.24.4
          sudo cp -a "${go_root}/." /usr/local/lib/go-1.24.4/
          sudo chown -R root:root /usr/local/lib/go-1.24.4
          sudo chmod -R go-w /usr/local/lib/go-1.24.4
          sudo ln -sfn /usr/local/lib/go-1.24.4/bin/go /usr/local/bin/go
      - name: Install pinned root-owned Node and TypeScript runtimes
        run: |
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          npm ci \
            --prefix validation-locks/node-typescript-v4 \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            --bin-links=false
          rm validation-locks/node-typescript-v4/node_modules/.package-lock.json
          sudo install -d /usr/local/lib/node-22.16.0
          sudo cp -a "${node_prefix}/." /usr/local/lib/node-22.16.0/
          sudo chown -R root:root /usr/local/lib/node-22.16.0
          sudo chmod -R go-w /usr/local/lib/node-22.16.0
          sudo install -d /usr/local/lib/node-typescript-4
          sudo cp -a \
            validation-locks/node-typescript-v4/node_modules/. \
            /usr/local/lib/node-typescript-4/
          sudo chown -R root:root /usr/local/lib/node-typescript-4
          sudo chmod -R go-w /usr/local/lib/node-typescript-4
          sudo ln -sfn \
            /usr/local/lib/node-22.16.0/bin/node \
            /usr/local/bin/node
          sudo ln -sfn \
            /usr/local/lib/node-22.16.0/bin/npm \
            /usr/local/bin/npm
          sudo ln -sfn \
            /usr/local/lib/node-22.16.0/bin/npx \
            /usr/local/bin/npx
          sudo ln -sfn \
            /usr/local/lib/node-typescript-4/typescript/bin/tsc \
            /usr/local/bin/tsc
      - name: Enable the packaged Bubblewrap AppArmor profile
        run: |
          sudo install -m 0644 \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser --replace \
            /etc/apparmor.d/bwrap-userns-restrict
      - name: Run sandbox fixture tests as the unprivileged runner
        run: |
          export PATH="/usr/local/bin:/usr/bin:/bin"
          npm run fixture:concurrency:self-test
          npm run fixture:go-shutdown:self-test
          npm run fixture:rust-decoder:self-test
          npm run fixture:typescript-cache:self-test
          npm run test:sandbox
